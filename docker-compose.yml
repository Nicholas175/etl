
services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb_etl
    restart: unless-stopped
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE:     ${DB_NAME}
      MARIADB_USER:         ${DB_USER}
      MARIADB_PASSWORD:     ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - etl_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USER} -p${DB_PASSWORD} --silent"]
      interval: 30s
      timeout: 10s
      retries: 5

  adminer:
    image: adminer:4.8.1
    container_name: adminer_etl
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "8080:8080"

  jupyterlab:
    build:
      context: .
      dockerfile: Dockerfile.jupyterlab
    image: jlab2025-jupyterlab:latest
    container_name: jupyter_etl
    restart: unless-stopped
    depends_on:
      - mariadb
      - prefect_server
    env_file: .env
    environment:          
      - PREFECT_API_URL=http://prefect_server:4200/api
    ports:
      - "8888:8888"
    networks:
      - etl_net
    volumes:
      - .:/home/jovyan/work


  prefect_server:
    image: prefecthq/prefect:3-latest
    container_name: prefect_server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    networks:
      - etl_net
    depends_on:
      mariadb:
        condition: service_healthy
        
  prefect_worker:
    image: prefecthq/prefect:3-latest
    container_name: prefect_worker
    depends_on:
      - prefect_server
    command: >
      bash -c "prefect config set PREFECT_API_URL=http://prefect_server:4200/api &&
               prefect worker start --pool pool_weather_data"
    environment:
      - PREFECT_API_URL=http://prefect_server:4200/api
    volumes:
      - .:/home/jovyan/work
    networks:           
      - etl_net

  etl_app:
    build: .
    container_name: etl_app
    depends_on:
      - mariadb
      - prefect_server
    env_file: .env
    volumes:
      - .:/home/jovyan/work
    tty: true       
    stdin_open: true
    command: tail -f /dev/null
    networks:
      - etl_net

volumes:
  mariadb_data:
  prefect_data:

networks:
  etl_net:
    driver: bridge